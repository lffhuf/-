<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>个人网盘 - 找回密码</title>
    <link rel="stylesheet" href="/static/css/style.css?v=202606201640">
    <style>
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/static/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }
        .forgot-steps {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .forgot-step {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }
        .forgot-step.active {
            color: #4fc3f7;
        }
        .forgot-step .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.15);
            font-weight: bold;
        }
        .forgot-step.active .step-num {
            background: rgba(79,195,247,0.3);
        }
        .step-divider {
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.3);
        }
        .timer {
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-top: 10px;
        }
        .resend-btn {
            display: block;
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px dashed rgba(255, 255, 255, 0.25);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .resend-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
            transform: translateY(-1px);
        }
        .resend-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .resend-btn.enabled {
            border-style: solid;
            border-color: rgba(79, 195, 247, 0.3);
            color: #4fc3f7;
        }
        .resend-btn.enabled:hover {
            border-color: rgba(79, 195, 247, 0.6);
            background: rgba(79, 195, 247, 0.1);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.3s;
        }
        .back-link:hover {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .input-code-group {
            display: flex;
            justify-content: center;
        }
        .input-code-group input {
            width: 100%;
            text-align: center;
            font-size: 1.6rem;
            letter-spacing: 12px;
            font-weight: bold;
            padding: 14px 16px;
            border: 2px solid rgba(79, 195, 247, 0.3);
            border-radius: 14px;
            background: rgba(79, 195, 247, 0.06);
            color: #4fc3f7;
            outline: none;
            transition: all 0.3s;
        }
        .input-code-group input::placeholder {
            color: rgba(79, 195, 247, 0.3);
            letter-spacing: 8px;
            font-size: 1.4rem;
        }
        .input-code-group input:focus {
            border-color: rgba(79, 195, 247, 0.7);
            background: rgba(79, 195, 247, 0.1);
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.2);
        }
        
        .resend-btn {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 11px;
            background: linear-gradient(135deg, rgba(79, 195, 247, 0.1), rgba(79, 195, 247, 0.04));
            border: 2px solid rgba(79, 195, 247, 0.35);
            border-radius: 14px;
            color: #4fc3f7;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        .resend-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(79, 195, 247, 0.1), transparent);
            transition: left 0.5s;
        }
        .resend-btn:hover::before {
            left: 100%;
        }
        .resend-btn:hover {
            background: linear-gradient(135deg, rgba(79, 195, 247, 0.2), rgba(79, 195, 247, 0.08));
            border-color: rgba(79, 195, 247, 0.6);
            color: #81d4fa;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.2);
        }
        .resend-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
        }
        .resend-btn.enabled {
            border-style: solid;
            border-color: rgba(79, 195, 247, 0.5);
            background: linear-gradient(135deg, rgba(79, 195, 247, 0.12), rgba(79, 195, 247, 0.05));
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="login-container">
        <div class="login-box">
            <h2>🔑 找回密码</h2>
            <p style="color:#aaa;margin-bottom:20px">通过注册邮箱验证码找回账户</p>
            
            <div class="forgot-steps">
                <div class="forgot-step active" id="step1-indicator">
                    <span class="step-num">1</span>
                    <span>邮箱验证</span>
                </div>
                <div class="step-divider">→</div>
                <div class="forgot-step" id="step2-indicator">
                    <span class="step-num">2</span>
                    <span>验证码</span>
                </div>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            

            
            <form method="POST" id="step1-form">
                <div class="form-group">
                    <label>📧 注册邮箱</label>
                    <input type="email" name="email" id="email-input" placeholder="请输入注册时使用的邮箱" required>
                </div>
                <button type="submit" name="action" value="send_otp" class="btn-glass btn-block">发送验证码</button>
            </form>
            
            <form method="POST" id="step2-form" style="display:none;margin-top:15px">
                <div class="form-group">
                    <label>📧 邮箱</label>
                    <input type="text" name="email" id="email-display" readonly style="background:rgba(255,255,255,0.05);color:#4fc3f7">
                </div>
                <div class="form-group">
                    <label>🔢 验证码</label>
                    <div class="input-code-group">
                        <input type="text" name="otp" placeholder="000000" maxlength="6" required>
                    </div>
                </div>
                <div class="timer" id="timer-display">验证码已发送，有效期 5 分钟</div>
                <button type="submit" name="action" value="verify_otp" class="btn-glass btn-block">验证并重置密码</button>
                <button type="button" class="resend-btn" id="resend-btn" onclick="backToStep1()" disabled>🔄 重新获取验证码</button>
            </form>
            
            <p style="text-align:center;margin-top:15px">
                <a href="/login" class="back-link">&larr; 返回登录</a>
            </p>
        </div>
    </div>
    
    <script>
        // 页面加载时：如果服务端已传了 email，说明已经发送过验证码，直接显示第二步
        const currentPageEmail = document.getElementById('email-display')?.value;
        if (currentPageEmail) {
            document.getElementById('step1-form').style.display = 'none';
            document.getElementById('step2-form').style.display = 'block';
            document.getElementById('step1-indicator').classList.remove('active');
            document.getElementById('step2-indicator').classList.add('active');
        }
        
        let timer = null;
        let countdown = 300;
        
        function startTimer() {
            if (timer) clearInterval(timer);
            const timerDisplay = document.getElementById('timer-display');
            const resendBtn = document.getElementById('resend-btn');
            resendBtn.disabled = true;
            resendBtn.classList.remove('enabled');
            countdown = 300;
            
            timer = setInterval(() => {
                countdown--;
                const min = Math.floor(countdown / 60);
                const sec = countdown % 60;
                timerDisplay.textContent = `验证码剩余 ${min}:${sec < 10 ? '0' : ''}${sec}`;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    timerDisplay.textContent = '验证码已过期，请重新发送';
                    resendBtn.disabled = false;
                    resendBtn.classList.add('enabled');
                    resendBtn.textContent = '🔄 重新发送验证码';
                }
            }, 1000);
        }
        
        // 第一步：发送验证码 —— AJAX 提交，不刷新页面
        document.getElementById('step1-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            if (!email) return;
            
            // 清除之前的提示
            document.querySelectorAll('.alert').forEach(el => el.remove());
            
            const formData = new FormData();
            formData.append('email', email);
            formData.append('action', 'send_otp');
            
            fetch('/forgot-password', {
                method: 'POST',
                headers: {'X-Requested-With': 'XMLHttpRequest'},
                body: formData
            })
            .then(async response => {
                const data = await response.json();
                if (!response.ok) {
                    alert(data.error);
                    return;
                }
                
                // 显示第二步
                document.getElementById('email-display').value = email;
                document.getElementById('step1-form').style.display = 'none';
                document.getElementById('step2-form').style.display = 'block';
                document.getElementById('step1-indicator').classList.remove('active');
                document.getElementById('step2-indicator').classList.add('active');
                
                // 处理邮件失败但验证码已生成的情况
                if (data.error_otp) {
                    const alertDiv = document.createElement('div');
                    alertDiv.className = 'alert alert-warning';
                    alertDiv.style.textAlign = 'center';
                    alertDiv.innerHTML = `
                        <p style="font-size:0.9rem;margin-bottom:8px">📧 邮件发送失败，验证码如下：</p>
                        <p style="font-size:2rem;letter-spacing:10px;font-weight:bold;color:#ff9800">${data.error_otp}</p>
                    `;
                    const container = document.querySelector('.login-box');
                    container.insertBefore(alertDiv, document.getElementById('forgot-steps'));
                }
                
                // 如果有提示信息，显示为普通 alert
                if (data.message) {
                    const alertDiv = document.createElement('div');
                    alertDiv.className = 'alert alert-success';
                    alertDiv.textContent = data.message;
                    const container = document.querySelector('.login-box');
                    container.insertBefore(alertDiv, document.getElementById('forgot-steps'));
                }
                
                startTimer();
            })
            .catch(err => console.error('请求失败:', err));
        });
        
        function backToStep1() {
            document.getElementById('step1-form').style.display = 'block';
            document.getElementById('step2-form').style.display = 'none';
            document.getElementById('step1-indicator').classList.add('active');
            document.getElementById('step2-indicator').classList.remove('active');
            if (timer) clearInterval(timer);
        }
        
        // 重新获取时清除邮件失败提示
        const origBackToStep1 = backToStep1;
        window.backToStep1 = function() {
            document.querySelectorAll('.alert').forEach(el => {
                if (el.style.textAlign === 'center') el.remove();
            });
            origBackToStep1();
        };
    </script>
</body>
</html>
