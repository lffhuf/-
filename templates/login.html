<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>个人网盘 - 登录</title>
    <link rel="stylesheet" href="/static/css/style.css?v=20260620">
</head>
<body>
    <div class="background"></div>
    <div class="login-container">
        <div class="login-box">
            <h1>📁 个人网盘</h1>
            <p class="subtitle">安全 · 快速 · 便捷</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="/login" class="glass-form">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn-glass">登 录</button>
            </form>
            
            <div class="login-footer">
                <p>还没有账号？<a href="/register" style="color: rgba(167, 119, 227, 0.9); text-decoration: none; font-weight: 600; padding: 4px 8px; border-radius: 6px;">立即注册</a></p>
                <p><a href="/forgot-password" style="color: rgba(167, 119, 227, 0.9); text-decoration: none; font-weight: 600; padding: 4px 8px; border-radius: 6px;">🔑 忘记密码？</a></p>
            </div>
        </div>
    </div>
</body>
</html>
