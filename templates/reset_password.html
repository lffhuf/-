<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>个人网盘 - 重置密码</title>
    <link rel="stylesheet" href="/static/css/style.css?v=20260620">
</head>
<body>
    <div class="background"></div>
    <div class="login-container glass">
        <h2>🔒 重置密码</h2>
        <p style="color:#aaa;margin-bottom:20px">请输入新密码</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>🔑 新密码</label>
                <input type="password" name="new_password" placeholder="至少6位" minlength="6" required>
            </div>
            <div class="form-group">
                <label>🔑 确认新密码</label>
                <input type="password" name="confirm_password" placeholder="再次输入新密码" minlength="6" required>
            </div>
            <input type="hidden" name="token" value="{{ token }}">
            <button type="submit" class="btn-primary btn-block">确认重置</button>
        </form>
        <p style="text-align:center;margin-top:15px">
            <a href="/login">← 返回登录</a>
        </p>
    </div>
</body>
</html>
