<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>个人网盘 - 管理员</title>
    <link rel="stylesheet" href="/static/css/style.css?v=20260620">
</head>
<body>
    <div class="background"></div>
    <div class="login-container">
        <div class="login-box">
            <h1>🔐 管理员登录</h1>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST" class="glass-form">
                <div class="form-group">
                    <label>管理员密码</label>
                    <input type="password" name="password" required placeholder="请输入管理员密码">
                </div>
                <button type="submit" class="btn-glass">登 录</button>
            </form>
            <p style="text-align:center;margin-top:15px">
                <a href="/" style="color: rgba(167, 119, 227, 0.9); text-decoration: none; font-weight: 600; padding: 4px 8px; border-radius: 6px;">← 返回用户登录</a>
            </p>
        </div>
    </div>
</body>
</html>
